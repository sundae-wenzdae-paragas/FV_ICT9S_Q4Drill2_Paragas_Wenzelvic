    <script>
    function checkHI(){
    var temp = document.getElementById("").value;
        var humid;
        var HeatIndex;
        var status = "";

    switch (true){
        case (HeatIndex <= 27 ): //compare
            message = "Comfortable / Cool";
            break;
        case (HeatIndex >= 28 && HeatIndex <= 32): //compare
            message = "Warm";
            break;
        case (HeatIndex >= 33 && HeatIndex <= 37): //compare
            message = "Hot";
            break;
        case (HeatIndex >= 38 && HeatIndex <= 41): //compare
            message = "Very Hot / Caution";
            break;

        case (HeatIndex >= 42):
            message = "Extreme Heat / Danger";

        default:
            status = "";
    }
    alert("Heat Index!:" + HeatIndex.toFixed(1) + "/n" + status);
}
