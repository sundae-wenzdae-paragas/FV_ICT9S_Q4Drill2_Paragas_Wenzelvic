<head>

    <style>
        body{
            background-image:url(https://cdn.abcotvs.com/dip/images/5343664_061219-cc-accuwx-heat-wave-formation-vid.jpg?w=1600);
            background-size:cover;

        .container{
            background-color:rgb(50, 9, 137, 0.5);
            border-radius:20px;
            justify-content:center;
            border:10px solid rgba(31, 8, 145, 0.5);
        }

        .container2{
            background-color:rgba(20, 140, 90, 0.2);
            border: 10px solid rgba(240, 6, 6, 0.2);
        }
    </style>

</head>
<body>
    <div class="container"><br>
    <h1><strong>Heat Index Checker</strong></h1>
    
    <input type="number" id="tempInput" placeholder="Enter Temperature" class="form-control mb-2">
    
    <button class="btn btn-info" onclick="checkHI()">Check temp</button><br>
</div>

<script>
function checkHI(){
    // 1. Get the value from the new input field and turn it into a number
    var temp = parseFloat(document.getElementById("tempInput").value);
    
    // 2. For this drill, we will treat the temp as the HeatIndex
    var HeatIndex = temp; 
    var status = "";

    // 3. Check if the user actually entered a number
    if (isNaN(HeatIndex)) {
        alert("Please enter a valid number");
        return;
    }

    switch (true){
        case (HeatIndex <= 27 && HeatIndex >= 20):
            status = "Comfortable / Cool";
            break;
        case (HeatIndex >= 28 && HeatIndex <= 32):
            status = "Warm";
            break;
        case (HeatIndex >= 33 && HeatIndex <= 37):
            status = "Hot";
            break;
        case (HeatIndex >= 38 && HeatIndex <= 41):
            status = "Very Hot / Caution";
            break;
        case (HeatIndex >= 42):
            status = "Extreme Heat / Danger";
            break;
        default:
            status = "Temperature could not be processed";
    }

    // 4. Fixed the newline character (it's \n, not /n)
    alert("Heat Index: " + HeatIndex.toFixed(1) + "\nStatus: " + status);
}
</script>
